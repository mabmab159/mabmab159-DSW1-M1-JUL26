<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<h1 class="text-5xl">Esta es la pagina de inicio - Index</h1>
<p>Bienvenido tienes las siguientes opciones:</p>
<a href="/alumno/nuevo">Formulario de registro</a>
<p>Puedes consultar los datos de los siguientes alumnos: </p>
<table class="table">
    <thead>
    <tr>
        <th>Codigo</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Correo</th>
        <th>Fecha de Nacimiento</th>
        <th>Opciones</th>
    </tr>
    </thead>
    <tr th:each="alumno : ${alumnos}">
        <td th:text="${alumno.codigo}"></td>
        <td th:text="${alumno.nombre}"></td>
        <td th:text="${alumno.apellido}"></td>
        <td th:text="${alumno.correo}"></td>
        <td th:text="${alumno.fechaNacimiento}"></td>
        <td>
            <a th:href="@{/alumno/{codigo}(codigo=${alumno.codigo})}">Ver</a>
            <a th:href="@{/alumno/actualizar/{codigo}(codigo=${alumno.codigo})}">Actualizar</a>
            <form th:action="@{/alumno/delete/{codigo}(codigo=${alumno.codigo})}" method="post">
                <button type="submit">Eliminar</button>
            </form>
        </td>
    </tr>
</table>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
